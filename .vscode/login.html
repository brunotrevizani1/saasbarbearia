<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Login do Barbeiro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="barbeiro.css" />
  </head>
  <body>
    <div class="layout login-layout">
      <main class="conteudo login-conteudo">
        <div class="login-card">
          <div class="topo-secao">
            <h2>Entrar no painel</h2>
            <p class="descricao-secao">
              Informe o e-mail e senha da barbearia.
            </p>
          </div>

          <div class="form-config">
            <label class="campo">
              <span>E-mail</span>
              <input
                type="email"
                id="email"
                placeholder="seuemail@exemplo.com.br"
              />
            </label>

            <label class="campo senha-campo">
              <span>Senha</span>

              <div class="input-senha">
                <input
                  type="password"
                  id="senha"
                  placeholder="Digite sua senha"
                />

                <button type="button" class="btn-olho" onclick="toggleSenha()">
                  <svg id="iconeOlho" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="12"
                      cy="12"
                      r="3"
                      stroke="currentColor"
                      stroke-width="1.8"
                    />
                  </svg>
                </button>
              </div>
            </label>

            <button class="btn-principal" onclick="fazerLogin()">Entrar</button>

            <p id="mensagemLogin" class="mensagem"></p>
          </div>
        </div>
      </main>
    </div>

    <script src="login.js"></script>
  </body>
</html>
